<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dynamic Player</title>
  <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
  <style>
    body { background-color: #111; margin: 0; padding: 0; overflow: hidden; }
    .video-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
    .video-js { width: 100% !important; height: 100% !important; }
  </style>
</head>
<body>

  <div class="video-container">
    <video id="my-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" data-setup="{}">
      <source id="video-source" src="" type="video/mp4" />
    </video>
  </div>

  <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
  <script>
    var player = videojs('my-player');

    // This is the function Sketchware will talk to
    function loadNewVideo(url, isM3u8) {
      var type = isM3u8 ? 'application/x-mpegURL' : 'video/mp4';
      
      player.src({
        src: url,
        type: type
      });
      player.ready(function() {
        player.play();
      });
    }
  </script>
</body>
</html>
